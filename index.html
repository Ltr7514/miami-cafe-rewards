<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Miami Cafe Loyalty</title>
</head>

<body>
<h2>Miami Cafe Loyalty</h2>

<input id="name" placeholder="Name / Magaca" /><br><br>
<input id="phone" placeholder="Phone / Lambarka" /><br><br>

<select id="action">
<option value="Visit / Booqasho">Visit / Booqasho</option>
<option value="Redeem / Abaalmarin qaado">Redeem / Abaalmarin qaado</option>
</select><br><br>

<button onclick="sendForm()">Submit / Gudbi</button>

<p id="status"></p>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbswdfaAw23-uxkytrbxR3jsbM3ChoA6Gqkjz00n_bE5S_zWdlvxy8f5JKLii6nxhZR_B/exec";

async function sendForm() {
const name = document.getElementById("name").value.trim();
const phone = document.getElementById("phone").value.trim();
const action = document.getElementById("action").value;
const status = document.getElementById("status");

if (!name || !phone) {
status.textContent = "Please fill in name and phone. / Fadlan geli magaca iyo lambarka.";
return;
}

status.textContent = "Submitting... / Waa la dirayaa...";

try {
const response = await fetch(WEB_APP_URL, {
method: "POST",
headers: {
"Content-Type": "text/plain;charset=utf-8"
},
body: JSON.stringify({ name, phone, action })
});

const text = await response.text();
console.log(text);

if (!response.ok) {
throw new Error("Request failed");
}

status.textContent = "Submitted successfully! / Si guul leh ayaa loo gudbiyey.";

// Clear form
document.getElementById("name").value = "";
document.getElementById("phone").value = "";
document.getElementById("action").value = "Visit / Booqasho";

} catch (error) {
console.error(error);
status.textContent = "Submit failed. / Diristu way fashilantay.";
}
}
</script>

</body>
</html>
